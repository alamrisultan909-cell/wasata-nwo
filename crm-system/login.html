<!DOCTYPE html><html dir="rtl" lang="ar"><head>
<meta charset="utf-8">
<title>تسجيل الدخول - المنصة الشاملة للوساطة</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&amp;display=swap" rel="stylesheet">
<style>body { font-family: 'IBM Plex Sans Arabic', sans-serif; }</style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md text-center">
<img class="h-20 mx-auto mb-6" src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg">
<h2 class="text-2xl font-bold text-slate-800 mb-8">تسجيل الدخول للنظام</h2>
<form class="space-y-4">
<input class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-600" placeholder="البريد الإلكتروني" type="email">
<input class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-600" placeholder="كلمة المرور" type="password">
<button class="w-full bg-blue-700 text-white p-4 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all" onclick="window.location.href='/app'" type="button">دخول مباشر</button>
</form>
</div>

</body></html>
