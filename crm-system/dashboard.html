<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | نظام الوساطة</title>
  <style>
    :root{
      --primary:#0f172a;--accent:#0ea5e9;--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .topbar{background:linear-gradient(90deg,var(--primary),#1e293b);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
    .topbar a{color:#fff;text-decoration:none;background:rgba(255,255,255,.15);padding:8px 12px;border-radius:8px;font-size:14px}
    .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
    .kpi{font-size:28px;font-weight:700;margin-top:8px}
    .muted{color:var(--muted);font-size:13px}
    .links{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
    .link{display:block;text-decoration:none;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px}
    table{width:100%;border-collapse:collapse;margin-top:10px;background:#fff}
    th,td{border-bottom:1px solid var(--border);padding:10px;text-align:right;font-size:14px}
    th{background:#f1f5f9}
    @media (max-width:900px){.grid,.links{grid-template-columns:1fr 1fr}}
    @media (max-width:600px){.grid,.links{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="topbar">
    <strong>نظام إدارة العملاء - لوحة التحكم</strong>
    <a href="/">الموقع العام</a>
  </div>

  <div class="wrap">
    <div class="grid">
      <div class="card"><div class="muted">عدد العملاء</div><div id="kpiCustomers" class="kpi">0</div></div>
      <div class="card"><div class="muted">العقود</div><div id="kpiContracts" class="kpi">0</div></div>
      <div class="card"><div class="muted">المدفوعات</div><div id="kpiPayments" class="kpi">0</div></div>
      <div class="card"><div class="muted">إجمالي العمولات</div><div id="kpiCommissions" class="kpi">0</div></div>
    </div>

    <div class="links">
      <a class="link" href="/app/contracts.html"><strong>إدارة العقود</strong><div class="muted">إضافة وتحديث حالة العقود</div></a>
      <a class="link" href="/app/financials.html"><strong>الإدارة المالية</strong><div class="muted">العمولات والمدفوعات</div></a>
      <a class="link" href="/app/login.html"><strong>تسجيل الدخول</strong><div class="muted">الوصول الآمن للنظام</div></a>
    </div>

    <div class="card" style="margin-top:14px">
      <strong>آخر العملاء</strong>
      <table>
        <thead><tr><th>#</th><th>الاسم</th><th>الجوال</th><th>الخدمة</th></tr></thead>
        <tbody id="customersBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const customers = JSON.parse(localStorage.getItem("wasata_customers_v1") || "[]");
    const contracts = JSON.parse(localStorage.getItem("wasata_contracts_v1") || "[]");
    const payments = JSON.parse(localStorage.getItem("wasata_payments_v1") || "[]");
    const financials = JSON.parse(localStorage.getItem("wasata_financials_v1") || "[]");

    document.getElementById("kpiCustomers").textContent = customers.length;
    document.getElementById("kpiContracts").textContent = contracts.length;
    document.getElementById("kpiPayments").textContent = payments.length;
    const total = financials.reduce((s,x)=>s + (Number(x.amount)||0),0);
    document.getElementById("kpiCommissions").textContent = total.toLocaleString("ar-SA");

    const body = document.getElementById("customersBody");
    const last = customers.slice(-8).reverse();
    if(!last.length){
      body.innerHTML = `<tr><td colspan="4" class="muted">لا توجد بيانات عملاء بعد.</td></tr>`;
    }else{
      body.innerHTML = last.map((c,i)=>`
        <tr>
          <td>${i+1}</td>
          <td>${c.name||""}</td>
          <td>${c.phone||""}</td>
          <td>${c.service||""}</td>
        </tr>
      `).join("");
    }
  </script>
</body>
</html>
