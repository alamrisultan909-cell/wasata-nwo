<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="عرض مختصر للسجلات المالية والعمولات في نظام الوساطة الشاملة مع تنسيق أكثر اتساقًا واستجابة.">
    <title>السجلات المالية - المنصة الشاملة للوساطة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/shared/site-base.css">
</head>
<body class="bg-slate-50 crm-responsive-layout min-h-screen">
    <a href="#main-content" class="skip-link">تجاوز إلى المحتوى</a>
    <aside class="crm-sidebar w-64 bg-slate-900 text-white p-6 fixed h-full right-0">
        <h1 class="font-bold text-xl mb-10">الوساطة الشاملة</h1>
        <nav aria-label="روابط السجلات المالية" class="space-y-4">
            <a href="/app" class="flex items-center gap-3 opacity-70 hover:opacity-100"><span class="material-icons-outlined" aria-hidden="true">dashboard</span> لوحة التحكم</a>
            <a href="/app/financials.html" class="flex items-center gap-3 font-bold text-blue-400"><span class="material-icons-outlined" aria-hidden="true">payments</span> المالية والعمولات</a>
        </nav>
    </aside>
    <main id="main-content" class="crm-responsive-main mr-64 flex-1 p-10">
        <h2 class="text-3xl font-bold text-slate-800 mb-10">مركز البيانات المالية الحية</h2>
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" aria-label="ملخص المؤشرات المالية">
            <article class="bg-white p-6 rounded-3xl border border-slate-200">
                <p class="text-slate-500 text-sm">إجمالي العمولات</p>
                <h3 class="text-2xl font-bold text-blue-600 mt-1">45,920 ر.س</h3>
            </article>
        </section>
    </main>
    <script>
        async function loadFinancials() {
            try {
                const res = await fetch('/api/sheets?type=financials');
                const data = await res.json();
                if (data && data.ok && data.headers && data.rows) {
                    // Update total commissions
                    let incomeIdx = data.headers.findIndex(h => h.toLowerCase() === 'income' || h === 'الدخل' || h === 'income');
                    if (incomeIdx === -1) {
                        incomeIdx = 2; // fallback
                    }
                    let total = 0;
                    if (incomeIdx !== -1 && incomeIdx < data.headers.length) {
                        data.rows.forEach(row => {
                            const val = parseFloat(row[incomeIdx]);
                            if (!isNaN(val)) {
                                total += val;
                            }
                        });
                    }
                    if (total > 0) {
                        const totalEl = document.querySelector('h3.text-blue-600');
                        if (totalEl) {
                            totalEl.textContent = total.toLocaleString('ar-SA') + ' ر.س';
                        }
                    }
                    
                    // Add table of financials
                    const mainContent = document.getElementById('main-content');
                    if (mainContent) {
                        const tableSection = document.createElement('section');
                        tableSection.className = 'bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mt-6';
                        
                        const tableWrapper = document.createElement('div');
                        tableWrapper.className = 'overflow-x-auto';
                        
                        const table = document.createElement('table');
                        table.className = 'w-full text-right';
                        
                        const thead = document.createElement('thead');
                        thead.className = 'bg-slate-100 text-slate-600';
                        const headerTr = document.createElement('tr');
                        data.headers.forEach(header => {
                            const th = document.createElement('th');
                            th.className = 'p-4';
                            th.textContent = header;
                            headerTr.appendChild(th);
                        });
                        thead.appendChild(headerTr);
                        table.appendChild(thead);
                        
                        const tbody = document.createElement('tbody');
                        tbody.className = 'divide-y divide-slate-100';
                        data.rows.forEach(row => {
                            const tr = document.createElement('tr');
                            tr.className = 'hover:bg-slate-50';
                            row.forEach((cell, idx) => {
                                const td = document.createElement('td');
                                td.className = 'p-4';
                                if (idx === 0) {
                                    td.className += ' font-bold';
                                }
                                td.textContent = cell;
                                tr.appendChild(td);
                            });
                            tbody.appendChild(tr);
                        });
                        table.appendChild(tbody);
                        
                        tableWrapper.appendChild(table);
                        tableSection.appendChild(tableWrapper);
                        mainContent.appendChild(tableSection);
                    }
                }
            } catch (err) {
                console.error('Error loading financials:', err);
            }
        }
        document.addEventListener('DOMContentLoaded', loadFinancials);
    </script>
</body>
</html>
