<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="صفحة متابعة العملاء في نظام الوساطة الشاملة مع تحسينات وصول واستجابة للجداول والهيكل العام.">
    <title>متابعة العملاء - المنصة الشاملة للوساطة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/shared/site-base.css">
</head>
<body class="bg-slate-50 crm-responsive-layout min-h-screen">
    <a href="#main-content" class="skip-link">تجاوز إلى المحتوى</a>
    <aside class="crm-sidebar w-64 bg-slate-900 text-white p-6 fixed h-full right-0">
        <h1 class="font-bold text-xl mb-10">الوساطة الشاملة</h1>
        <nav aria-label="روابط متابعة العملاء" class="space-y-4">
            <a href="/app" class="flex items-center gap-3 opacity-70 hover:opacity-100"><span class="material-icons-outlined" aria-hidden="true">dashboard</span> لوحة التحكم</a>
            <a href="/app/clients.html" class="flex items-center gap-3 font-bold text-blue-400"><span class="material-icons-outlined" aria-hidden="true">groups</span> متابعة العملاء</a>
        </nav>
    </aside>
    <main id="main-content" class="crm-responsive-main mr-64 flex-1 p-10">
        <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-10">
            <h2 class="text-3xl font-bold text-slate-800">سجل متابعة العملاء</h2>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold" type="button">+ إضافة عميل</button>
        </div>
        <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <caption class="sr-only">جدول يوضح حالة العملاء الحاليين والخدمات المرتبطة بهم</caption>
                    <thead class="bg-slate-100 text-slate-600">
                        <tr>
                            <th class="p-4">الاسم</th>
                            <th class="p-4">الجوال</th>
                            <th class="p-4">الخدمة</th>
                            <th class="p-4">الحالة</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr class="hover:bg-slate-50">
                            <td class="p-4 font-bold">خالد عبدالله العمري</td>
                            <td class="p-4">053366693</td>
                            <td class="p-4">بناء ذاتي</td>
                            <td class="p-4"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">تم التنفيذ</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script>
        async function loadClients() {
            try {
                const res = await fetch('/api/sheets?type=customers');
                const data = await res.json();
                if (data && data.ok && data.headers && data.rows) {
                    const thead = document.querySelector('thead tr');
                    const tbody = document.querySelector('tbody');
                    if (thead && tbody) {
                        thead.innerHTML = '';
                        tbody.innerHTML = '';
                        
                        data.headers.forEach(header => {
                            const th = document.createElement('th');
                            th.className = 'p-4';
                            th.textContent = header;
                            thead.appendChild(th);
                        });
                        
                        data.rows.forEach(row => {
                            const tr = document.createElement('tr');
                            tr.className = 'hover:bg-slate-50';
                            row.forEach((cell, idx) => {
                                const td = document.createElement('td');
                                td.className = 'p-4';
                                if (idx === 0) {
                                    td.className += ' font-bold';
                                }
                                td.textContent = cell;
                                tr.appendChild(td);
                            });
                            tbody.appendChild(tr);
                        });
                    }
                }
            } catch (err) {
                console.error('Error loading clients:', err);
            }
        }
        document.addEventListener('DOMContentLoaded', loadClients);
    </script>
</body>
</html>
